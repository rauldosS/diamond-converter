<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Alii - Kairos Agency</title>

    <link rel="icon" href="assets/images/kairos_rosa_destaque.png" type="image/x-icon">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap');

        :root {
            --bg-dark: #050505;
            --card-bg: #0c0c0c;
            --gold: #d4af37;
            --gold-dim: #997a15;
            --border-color: #2a2a2a;
            --text-light: #f0f0f0;
            --text-muted: #888888;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #050505;

            /* 1. PLANO DE FUNDO GERAL (Setas apontando para as laterais na sua imagem) */
            /* Aqui você coloca a imagem de fundo que tem a bússola grande opaca */

            color: var(--text-light);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        body::before {
            content: "";

            background-image: url('assets/images/fundo.png'), radial-gradient(circle at center, #1a1505 0%, var(--bg-dark) 50%);
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;

            opacity: 0.1;

            position: fixed;
            inset: 0;
        }

        .calculadora {
            background: var(--card-bg);
            width: 100%;
            max-width: 550px;
            padding: 32px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
            position: relative;
            overflow: hidden;
        }

        /* 2. LOGO SUPERIOR */
        .brand-header {
            display: flex;
            justify-content: left; /* Centraliza a logo */
            margin-bottom: 24px;
        }

        .img-logo {
            max-width: 240px;
            /* Ajuste o tamanho da sua logo aqui */
            height: auto;
            display: block;
        }

        .header h2 {
            margin: 0 0 8px 0;
            font-size: 22px;
            font-weight: 500;
            color: var(--gold);
        }

        .header h2 span {
            color: var(--text-light);
        }

        .header p {
            margin: 0 0 24px 0;
            font-size: 13px;
            color: var(--text-muted);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        .input-box {
            background-color: #111111;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px 16px;
            transition: all 0.3s ease;
            border: 1px solid rgba(238, 175, 97, 0.2);
        }

        .input-box:focus-within {
            border-color: var(--gold);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.1);
        }

        /* 3. IMAGEM DE FUNDO DO CAMPO DE REAIS */
        .input-box.full-width {
            grid-column: span 2;
            background-color: #111111;

            /* Coloque a imagem da bússola dourada cortada aqui */
            background-image: url('assets/images/kairos_rosa_destaque.png');
            background-repeat: no-repeat;
            background-position: 140%;
            background-size: contain;

            background-size: 300px;
            /* Ou 'cover', dependendo do corte da sua imagem */
        }

        .input-box label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-light);
            margin-bottom: 12px;
            font-weight: 400;
        }

        .input-box label span {
            color: var(--gold);
        }

        .input-box input {
            width: 100%;
            border: none;
            background: transparent;
            font-size: 20px;
            color: var(--text-light);
            outline: none;
            font-family: 'Montserrat', sans-serif;
        }

        .api-status {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 8px;
            display: block;
        }

        /* Botões */
        .btn {
            width: 100%;
            padding: 16px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--gold);
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border: 2px solid rgba(238, 175, 97, .6);
        }

        .btn:hover {
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.05);
        }

        /* 4. ÍCONE DO BOTÃO FECHAR */
        .img-icone-btn {
            width: 30px;
            /* Ajuste o tamanho do ícone aqui */
            height: auto;
        }

        .regra-fixa {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.6;
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 16px;
        }

        .regra-fixa .icon {
            color: var(--gold);
            font-size: 18px;
            border: 1px solid var(--gold);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }

        .regra-fixa strong {
            color: var(--gold);
            font-weight: 500;
        }

        .social-links {
            display: flex;
            justify-content: center;
            margin-top: 24px;
            display: flex;
            gap: 24px;
        }

        .social-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 13px;
            letter-spacing: 1px;
            transition: color 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .social-links a:hover {
            color: var(--gold);
        }

        @media (max-width: 600px) {
            body {
                padding: 0; /* Remove o padding do body para a calculadora esticar mais */
            }

            .brand-header {
                display: flex;
                justify-content: center; /* Centraliza a logo */
            }
                
            .calculadora {
                padding: 24px 16px; /* Reduz as margens internas para ganhar espaço pros inputs */
                border-radius: 0; /* Tira o arredondamento para mesclar com a tela (opcional) */
                min-height: 100vh; /* Faz a calculadora ocupar a tela toda no celular */
                box-shadow: none; /* Sem sombra no mobile já que ocupa a tela toda */
                display: flex;
                flex-direction: column;
            }

            .social-links {
                justify-content: center; /* Centraliza os links do rodapé */
                padding-bottom: 24px;
            }
            
            /* Ajuste fino na regra fixa para telas muito estreitas */
            .regra-fixa {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>

<body>

    <div class="calculadora">
        <div class="brand-header">
            <img src="assets/images/kairos.jpg" alt="Kairos Agency" class="img-logo">
        </div>

        <div class="header">
            <h2>Calculadora <span>do Alii</span></h2>
            <p>Preencha qualquer campo para calcular automaticamente os demais.</p>
        </div>

        <div class="grid">
            <div class="input-box">
                <label><span>💎</span> Diamantes</label>
                <input type="number" id="diamantes" placeholder="0">
            </div>
            <div class="input-box">
                <label><span>⭐</span> Pontos</label>
                <input type="number" id="pontos" placeholder="0">
            </div>
            <div class="input-box">
                <label><span>💵</span> Dólares</label>
                <input type="number" id="dolares" placeholder="0.00" step="0.01">
            </div>
            <div class="input-box">
                <label><span>👑</span> Charme</label>
                <input type="number" id="charme" placeholder="0">
            </div>

            <div class="input-box full-width">
                <label><span>R$</span> Valor em Reais (BRL)</label>
                <input type="number" id="reais" placeholder="0.00" step="0.01">
                <span class="api-status" id="status-cotacao">Buscando cotação do dia...</span>
            </div>
        </div>

        <button class="btn" onclick="limparCampos()"><span>↻</span> LIMPAR</button>

        <div class="regra-fixa">
            <div class="icon">i</div>
            <div>
                <strong>Regra fixa:</strong> 1 diamante = 750 pontos | 12.000.000 pontos = US$ 20 | 5 diamantes = 1
                charme.
            </div>
        </div>

        <div class="social-links">
            <a href="https://www.instagram.com/kaiiros.agency/" target="_blank">Instagram</a>
            <a href="https://www.tiktok.com/@kairos.agency5" target="_blank">TikTok</a>
        </div>
    </div>

    <script>
        const inputs = {
            diamantes: document.getElementById('diamantes'),
            pontos: document.getElementById('pontos'),
            dolares: document.getElementById('dolares'),
            charme: document.getElementById('charme'),
            reais: document.getElementById('reais')
        };
        const statusCotacao = document.getElementById('status-cotacao');
        let cotacaoDolarAtual = 0;

        async function buscarCotacaoAPI() {
            try {
                const resposta = await fetch('https://economia.awesomeapi.com.br/last/USD-BRL');
                const dados = await resposta.json();
                cotacaoDolarAtual = parseFloat(dados.USDBRL.ask);
                statusCotacao.innerText = `Cotação do dia: US$ 1 = R$ ${cotacaoDolarAtual.toFixed(2)}`;

                if (inputs.reais.value) {
                    calcularTudo('reais');
                } else if (inputs.dolares.value) {
                    calcularTudo('dolares');
                }
            } catch (erro) {
                statusCotacao.innerText = "Erro ao buscar cotação. Verifique sua conexão.";
            }
        }

        function calcularTudo(origem) {
            let d = 0;
            const valor = parseFloat(inputs[origem].value);

            if (isNaN(valor) || valor < 0) return;

            if (origem === 'diamantes') {
                d = valor;
            } else if (origem === 'pontos') {
                d = valor / 750;
            } else if (origem === 'dolares') {
                const pontos = valor * 600000;
                d = pontos / 750;
            } else if (origem === 'charme') {
                d = valor * 5;
            } else if (origem === 'reais') {
                if (cotacaoDolarAtual <= 0) return;

                const dolares = valor / cotacaoDolarAtual;
                const pontos = dolares * 600000;
                d = pontos / 750;
            }

            if (origem !== 'diamantes') inputs.diamantes.value = formatar(d);
            if (origem !== 'pontos') inputs.pontos.value = formatar(d * 750);
            if (origem !== 'dolares') inputs.dolares.value = formatar((d * 750) / 600000, 2);
            if (origem !== 'charme') inputs.charme.value = formatar(d / 5);

            if (origem !== 'reais' && cotacaoDolarAtual > 0) {
                const dolaresCalculados = (d * 750) / 600000;
                inputs.reais.value = (dolaresCalculados * cotacaoDolarAtual).toFixed(2);
            }
        }

        function formatar(numero, decimais = 0) {
            return Number(numero.toFixed(decimais));
        }

        ['diamantes', 'pontos', 'dolares', 'charme', 'reais'].forEach(campo => {
            inputs[campo].addEventListener('input', (e) => calcularTudo(campo));
        });

        function limparCampos() {
            Object.values(inputs).forEach(input => input.value = '');
        }

        buscarCotacaoAPI();
    </script>

</body>

</html>
